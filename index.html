<!DOCTYPE html>
<html lang="pt-br">
<head>
   <meta charset="UTF-8">
   <title>Stranger Things API</title>
   <link rel="stylesheet" href="style/style.css">
</head>
<body>
   <header>
     <img class="logo" src="assets/img/ST-Logo.png" alt="Logo-ST">
   </header>
   <main>
     <section class="search">
       <input type="text" id="busca" placeholder="Digite o nome do personagem">
       <button onclick="buscarPersonagem()">Buscar</button>

     <div id="mensagem"></div>

   </main>
   <footer class="footer">
     <p>Dados fornecidos pela API
       <a href="https://www.tvmaze.com/api" target="_blank">TVMaze</a>
     </p>
     <p class="creditos">
       Projeto desenvolvido para estudo de consumo de API com JavaScript <br>
       Desenvolvido por Nikollas e Vitor
     </p>
   </footer>
   <script src="js/script.js"></script>

</html>
